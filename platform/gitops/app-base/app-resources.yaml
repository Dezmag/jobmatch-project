# ==========================================
# 1. МІКРОСЕРВІС БЕКЕНДУ (API)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-api-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-api
  template:
    metadata:
      labels:
        app: jobmatch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/dezmag/jobmatch-project/job-match-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
            - name: VECTOR_DB_URL
              value: "http://cluster.local"  
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-service # Ця назва жорстко використовується всередині nginx.conf
  namespace: default
spec:
  type: ClusterIP # Приватний IP, бекенд надійно схований всередині кластера
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: jobmatch-api

---
# ==========================================
# 2. МІКРОСЕРВІС ФРОНТЕНДУ (WEB NGINX)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-web-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-web
  template:
    metadata:
      labels:
        app: jobmatch-web
    spec:
      containers:
        - name: web
          image: ghcr.io/dezmag/jobmatch-project/job-match-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-web-service
  namespace: default
spec:
  type: LoadBalancer # Цей сервіс дивиться в інтернет і дає нам постійну IP сайту
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: jobmatch-web
---
# ==========================================
# 3. ВЕКТОРНА БАЗА ДАНИХ (QDRANT FOR MEMORY)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-vector-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-vector-db
  template:
    metadata:
      labels:
        app: jobmatch-vector-db
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: default
spec:
  type: ClusterIP # Приватний внутрішній порт для безпеки
  ports:
    - port: 6333
      targetPort: 6333
  selector:
    app: jobmatch-vector-db