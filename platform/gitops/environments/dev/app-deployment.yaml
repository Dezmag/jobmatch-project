apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobmatch-app
  template:
    metadata:
      labels:
        app: jobmatch-app
    spec:
      containers:
        - name: app
          image: ghcr.io/dezmag/jobmatch-project/job-match-app:latest
          imagePullPolicy: Always # Примусово качати новий образ з GitHub!
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: RESTART_VERSION
              value: "v2" # Цей рядок змусить Kubernetes скинути старий кеш поду!
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: jobmatch-app
