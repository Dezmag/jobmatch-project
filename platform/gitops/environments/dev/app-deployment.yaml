apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-app
  namespace: default
spec:
  replicas: 2 # Завжди запускаємо мінімум 2 копії для стабільності
  selector:
    matchLabels:
      app: jobmatch-app
  template:
    metadata:
      labels:
        app: jobmatch-app
    spec:
      containers:
        - name: app
          image: ghcr.io/dezmag/jobmatch-project/job-match-app:latest # Твій зібраний образ!
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            # Сюди ми пізніше додамо секрети для AI моделей (Gemini/OpenAI)
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-service
  namespace: default
spec:
  type: LoadBalancer # Google Cloud автоматично дасть цьому сервісу постійну IP в інтернеті!
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: jobmatch-app
