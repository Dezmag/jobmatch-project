apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobmatch-app
  template:
    metadata:
      labels:
        app: jobmatch-app
    spec:
      containers:
        - name: app
          image: ghcr.io/dezmag/jobmatch-project/job-match-app:latest
          imagePullPolicy: Always # Наказуємо завжди качати свіжий образ з GitHub
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
            - name: FORCE_UPDATE_TRIGGER
              value: "v3" # Оновлений тригер для скидання кешу хмари
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: jobmatch-app
