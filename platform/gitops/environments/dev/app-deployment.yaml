# ==========================================
# 1. МІКРОСЕРВІС БЕКЕНДУ (API)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-api-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-api
  template:
    metadata:
      labels:
        app: jobmatch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/dezmag/jobmatch-project/job-match-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-service # Ця назва жорстко прописана в nginx.conf!
  namespace: default
spec:
  type: ClusterIP # Внутрішній IP, бекенд більше не світиться в інтернет відкритим
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: jobmatch-api

---
# ==========================================
# 2. МІКРОСЕРВІС ФРОНТЕНДУ (WEB NGINX)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobmatch-web-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobmatch-web
  template:
    metadata:
      labels:
        app: jobmatch-web
    spec:
      containers:
        - name: web
          image: ghcr.io/dezmag/jobmatch-project/job-match-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: jobmatch-web-service
  namespace: default
spec:
  type: LoadBalancer # Оцієї permanent IP-адресою ми будемо відкривати САЙТ
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: jobmatch-web
