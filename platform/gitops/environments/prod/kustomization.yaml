apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../app-base

# Додаємо префікс prod- до всіх ресурсів
namePrefix: prod-

# Промислове масштабування Production середовища
patches:
  # Збільшуємо кількість подів для API бекенду до 3
  - target:
      kind: Deployment
      name: jobmatch-api-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "production"

  # Збільшуємо кількість подів для Nginx фронтенду до 2
  - target:
      kind: Deployment
      name: jobmatch-web-deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
