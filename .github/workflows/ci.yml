name: CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/job-match-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Збірка та пуш БЕКЕНДУ (API)
      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          target: api
          push: true
          tags: ghcr.io/${{ github.repository }}/job-match-api:latest

      # Збірка та пуш ФРОНТЕНДУ (Web)
      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          target: web
          push: true
          tags: ghcr.io/${{ github.repository }}/job-match-web:latest
