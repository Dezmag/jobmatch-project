name: CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'evals/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/skills/**'
      - 'evals/**'

jobs:
  # КРОК 1: Прогін автоматичних тестів промптів з нашої нової папки evals
  run-ai-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Надаємо права хмарі на запис файлів у репозиторій

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Запускаємо наш калькулятор у хмарі
      - name: Run FinOps Automated Calculator
        run: |
          node evals/finops-calc.js

      # Хмара сама комітить оновлений файл AI_PROVIDERS.md назад у твій Git
      - name: Commit and Push updated AI_PROVIDERS.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add AI_PROVIDERS.md
          git diff-index --quiet HEAD || git commit -m "chore: auto-update finops tables [skip ci]"
          git push

      # Запускаємо тести безпеки та промптів
      - name: Run LLMOps Evaluation Suite
        run: |
          node evals/run-evals.js

  # КРОК 2: Твоя стабільна збірка Docker образів
  build-and-push:
    needs: run-ai-evals
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          target: api
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/job-match-api:latest

      - name: Build and push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          target: web
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}/job-match-web:latest
