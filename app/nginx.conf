server {
    listen 80;
    server_name localhost;

    # Внутрішній DNS Kubernetes для динамічного пошуку сервісів
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # Роздача статичних файлів нашого фронтенду (Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Магія проксі: перенаправляємо всі запити до API на наш K8s-сервіс бекенду
    location /api/ {
        # Використовуємо змінну, щоб Nginx не падав при старті
        set $backend_upstream "http://cluster.local";
        
        proxy_pass $backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
